name: build & publish lumynax gateway image

on:
  push:
    branches: [main]
    paths:
      - 'deployments/gateway/**'
      - '.github/workflows/build-gateway-image.yml'
    tags:
      - 'gateway-v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aimaghsoodi/lumynax-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}},prefix=gateway-v
            type=semver,pattern={{major}}.{{minor}},prefix=gateway-v
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=LumynaX Gateway
            org.opencontainers.image.description=OpenAI-compatible gateway for the LumynaX sovereign-AI release family by AbteeX AI Labs (Aotearoa New Zealand).
            org.opencontainers.image.vendor=AbteeX AI Labs
            org.opencontainers.image.source=https://github.com/Aimaghsoodi/lumynax-release
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./deployments/gateway
          file: ./deployments/gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
