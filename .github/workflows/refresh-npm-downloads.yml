name: refresh npm download diagram

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate chart
        run: |
          python scripts/generate_npm_downloads_diagram.py \
            --output docs/marama-route-npm-downloads.svg \
            --json-output docs/marama-route-npm-downloads.json
      - name: Commit changes
        run: |
          if git diff --quiet -- docs/marama-route-npm-downloads.svg docs/marama-route-npm-downloads.json; then
            echo "No npm download chart changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/marama-route-npm-downloads.svg docs/marama-route-npm-downloads.json
          git commit -m "chore: refresh npm download diagram"
          git push
