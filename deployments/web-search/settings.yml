# SearXNG settings — self-hosted, sovereignty-friendly web search
# https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

general:
  instance_name: "LumynaX Search"
  contact_url: "mailto:aimaghsoodi@outlook.com"
  enable_metrics: false   # don't expose metrics endpoint by default

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "CHANGE-ME-set-via-SEARXNG_SECRET-env"
  base_url: false
  image_proxy: true
  http_protocol_version: "1.0"
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Frame-Options: deny
    Strict-Transport-Security: "max-age=31536000; includeSubDomains"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: true
  results_on_new_tab: false

search:
  safe_search: 1
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json
    - rss

# Privacy: don't log queries to disk
outgoing:
  request_timeout: 6.0
  max_request_timeout: 12.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

# Engines — enable a balanced default set, disable trackers
engines:
  - name: duckduckgo
    disabled: false
  - name: bing
    disabled: false
  - name: brave
    disabled: false
  - name: wikipedia
    disabled: false
  - name: github
    disabled: false
  - name: arxiv
    disabled: false
  # Disable trackers / data-collecting engines
  - name: google
    disabled: false
  - name: yahoo
    disabled: true
